apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  ORDER_HTTP_PORT: "8082"
  ORDER_PG_DSN: "host=postgres-order port=5432 user=order password=order dbname=order_db sslmode=disable"
  PRODUCT_SERVICE_URL: "http://product-service:8080"
  TEMPORAL_HOST_PORT: "temporal:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "order-task-queue"
  OTEL_SERVICE_NAME: "order-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.observability:4318"
  OTEL_SERVICE_ENVIRONMENT: "k8s"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8082
      targetPort: 8082
---
# API server (handles REST, starts workflows).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: order-service
          image: ecommerce/order-service:dev
          imagePullPolicy: IfNotPresent
          command: ["/server"]
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: order-service-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
---
# Temporal worker (executes the OrderWorkflow + activities). Scales independently.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-worker
  namespace: ecommerce
  labels:
    app: order-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-worker
  template:
    metadata:
      labels:
        app: order-worker
    spec:
      containers:
        - name: order-worker
          image: ecommerce/order-service:dev
          imagePullPolicy: IfNotPresent
          command: ["/worker"]
          envFrom:
            - configMapRef:
                name: order-service-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-worker
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-worker
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
