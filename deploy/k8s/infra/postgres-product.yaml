# PostgreSQL for the Product Service. Started with wal_level=logical so Debezium
# can stream WAL changes (CDC) into Kafka -> Elasticsearch. Schema and the CDC
# publication are created by the product-service golang-migrate migrations at startup.
apiVersion: v1
kind: Service
metadata:
  name: postgres-product
  namespace: ecommerce
spec:
  clusterIP: None
  selector:
    app: postgres-product
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-product
  namespace: ecommerce
spec:
  serviceName: postgres-product
  replicas: 1
  selector:
    matchLabels:
      app: postgres-product
  template:
    metadata:
      labels:
        app: postgres-product
    spec:
      containers:
        - name: postgres
          image: postgres:16
          # Logical replication settings required for CDC.
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
          env:
            - name: POSTGRES_USER
              value: product
            - name: POSTGRES_PASSWORD
              value: product
            - name: POSTGRES_DB
              value: product_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "product"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
