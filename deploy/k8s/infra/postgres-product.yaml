# PostgreSQL for the Product Service. Started with wal_level=logical so Debezium
# can stream WAL changes (CDC) into Kafka -> Elasticsearch.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-product-init
  namespace: ecommerce
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        sku         TEXT        NOT NULL UNIQUE,
        name        TEXT        NOT NULL,
        description TEXT,
        price_cents BIGINT      NOT NULL DEFAULT 0,
        currency    TEXT        NOT NULL DEFAULT 'USD',
        stock       INT         NOT NULL DEFAULT 0,
        attributes  JSONB       NOT NULL DEFAULT '{}'::jsonb,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    ALTER TABLE products REPLICA IDENTITY FULL;
    DROP PUBLICATION IF EXISTS ecommerce_cdc;
    CREATE PUBLICATION ecommerce_cdc FOR TABLE products;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-product
  namespace: ecommerce
spec:
  clusterIP: None
  selector:
    app: postgres-product
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-product
  namespace: ecommerce
spec:
  serviceName: postgres-product
  replicas: 1
  selector:
    matchLabels:
      app: postgres-product
  template:
    metadata:
      labels:
        app: postgres-product
    spec:
      containers:
        - name: postgres
          image: postgres:16
          # Logical replication settings required for CDC.
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
          env:
            - name: POSTGRES_USER
              value: product
            - name: POSTGRES_PASSWORD
              value: product
            - name: POSTGRES_DB
              value: product_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "product"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: postgres-product-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
