# Grafana with Prometheus, Loki, and Jaeger datasources pre-provisioned.
# Default login admin/admin. UI on :3000 (port-forward: make pf-grafana).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ecommerce
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-scaling
  namespace: observability
data:
  scaling.json: |
    {
      "title": "E-commerce / Scaling Overview",
      "uid": "ecom-scaling",
      "schemaVersion": 39,
      "panels": [
        {
          "type": "timeseries",
          "title": "Deployment replicas (ready)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "kube_deployment_status_replicas_ready{namespace=\"ecommerce\"}", "legendFormat": "{{deployment}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "HPA desired vs current replicas",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {"expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"ecommerce\"}", "legendFormat": "{{horizontalpodautoscaler}} desired"},
            {"expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"ecommerce\"}", "legendFormat": "{{horizontalpodautoscaler}} current"}
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_SERVER_ROOT_URL
              value: http://localhost/grafana
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-scaling
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
